site_name: SQMeter Documentation
site_description: ESP32 Dark Sky Monitoring System
site_author: decanus
repo_url: https://github.com/decanus/SQMeter
repo_name: decanus/SQMeter
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Build & Upload: getting-started/build.md
    - Development Workflow: getting-started/dev-workflow.md
  - Reference:
    - API Reference: reference/api.md
    - Configuration: reference/configuration.md
    - Hardware Setup: reference/hardware.md
  - Contributing:
    - Security: ../SECURITY.md
