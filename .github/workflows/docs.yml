name: Deploy Docs & Demo

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'web/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Install web dependencies
        run: npm install
        working-directory: web

      # Generate MSW service worker file and commit it to public/ if missing.
      # The file is version-pinned to the installed msw package.
      - name: Init MSW service worker
        run: npx msw init public/ --save
        working-directory: web

      - name: Build demo site
        run: npm run build:demo
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Take screenshots
        run: npm run screenshots
        working-directory: web
        continue-on-error: true  # screenshots are best-effort; don't fail the deploy

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Copy demo into docs site
        run: cp -r web/dist-demo site/demo

      # Deploy everything — docs at /SQMeter/, demo at /SQMeter/demo/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
