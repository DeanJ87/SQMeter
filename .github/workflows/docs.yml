name: Deploy Docs & Demo

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'web/**'
      - '.github/workflows/docs.yml'

# Cancel an in-progress docs deploy when a newer push lands on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Init MSW service worker
        run: npx msw init public/ --save
        working-directory: web

      - name: Build demo site
        run: npm run build:demo
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Take screenshots
        run: npm run screenshots
        working-directory: web
        continue-on-error: true

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Copy demo into docs site
        run: cp -r web/dist-demo site/demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
