; PlatformIO Project Configuration for SQM v2
; Modern ESP32 Dark Sky Monitoring System

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; C++17 with strict warnings
build_flags = 
    -std=gnu++17
    -Wall
    -Wextra
    -Werror
    -Wno-implicit-fallthrough
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=1

build_unflags = 
    -std=gnu++11

; Dependencies
lib_deps = 
    adafruit/Adafruit TSL2591 Library@^1.4.1
    adafruit/Adafruit BME280 Library@^2.2.2
    adafruit/Adafruit MLX90614 Library@^2.1.3
    adafruit/Adafruit Unified Sensor@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
    knolleary/PubSubClient@^2.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Filesystem settings
board_build.filesystem = littlefs
board_build.partitions = partitions.csv

; Upload settings
upload_speed = 115200
upload_protocol = esptool  ; Default to serial, can override with --upload-port IP

; Build web UI before uploading filesystem
extra_scripts = 
    pre:scripts/build_web.py
